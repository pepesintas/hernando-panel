<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAGRANDE — Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f5f0}
.hidden{display:none!important}
/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f0}
.login-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:2.5rem;width:360px;box-shadow:0 2px 20px rgba(0,0,0,0.06)}
.login-logo{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-0.5px}
.login-logo span{color:#888;font-weight:400}
.login-sub{font-size:13px;color:#888;margin-bottom:2rem}
.tabs-auth{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid #e5e5e0}
.tab-auth{font-size:14px;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;color:#888;background:none;border-top:none;border-left:none;border-right:none}
.tab-auth.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.field{margin-bottom:1rem}
.field label{font-size:12px;color:#666;display:block;margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1a1a1a}
.field textarea{resize:vertical;min-height:80px}
.btn{font-size:13px;padding:9px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;transition:all 0.15s}
.btn:hover{background:#f5f5f0}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;width:100%}
.btn-primary:hover{opacity:0.85}
.btn-sm{width:auto;padding:6px 14px;font-size:13px}
.btn-danger{background:#c0392b;color:#fff;border-color:#c0392b}
.btn-danger:hover{opacity:0.85}
.auth-error{font-size:12px;color:#c0392b;margin-top:8px;display:none;padding:8px;background:#FEE8E4;border-radius:6px}
/* APP */
#app{display:none;min-height:100vh;background:#f5f5f0}
.app-inner{max-width:1200px;margin:0 auto;padding:1.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e5e5e0;flex-wrap:wrap;gap:8px}
.logo{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.logo span{font-weight:400;color:#888;font-size:14px;margin-left:6px}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.user-pill{font-size:12px;color:#666;padding:5px 10px;border:1px solid #e5e5e0;border-radius:20px;background:#fff}
.status-dot{width:7px;height:7px;border-radius:50%;background:#27ae60;display:inline-block;margin-right:4px}
.status-dot.red{background:#e74c3c}
/* TABS */
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid #e5e5e0;overflow-x:auto}
.tab{font-size:14px;padding:9px 18px;cursor:pointer;border-bottom:2px solid transparent;color:#888;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all 0.15s}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.tab:hover{color:#1a1a1a}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:1rem}
.metric-label{font-size:12px;color:#888;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600}
.metric-sub{font-size:11px;color:#aaa;margin-top:3px}
.metric-delta{font-size:12px;margin-top:4px;font-weight:500}
.metric-delta.up{color:#27ae60}
.metric-delta.down{color:#e74c3c}
/* TABLES */
.section-title{font-size:12px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.table-wrap{overflow-x:auto;border:1px solid #e5e5e0;border-radius:10px;margin-bottom:1.5rem;background:#fff}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-weight:500;font-size:12px;color:#888;border-bottom:1px solid #f0f0eb;background:#fafafa;white-space:nowrap}
td{padding:9px 14px;border-bottom:1px solid #f0f0eb;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;display:inline-block;font-weight:500}
.b-encargo{background:#FEF3E2;color:#8B5000}
.b-sobrante{background:#E8F8F0;color:#1A6B40}
.b-alert{background:#FEE8E4;color:#7A2515}
.b-ok{background:#E8F8F0;color:#1A6B40}
.b-warn{background:#FEF3E2;color:#8B5000}
/* FILTERS */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
/* CHARTS */
.chart-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:1.25rem;margin-bottom:1.5rem}
.chart-wrap{position:relative;width:100%}
/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
/* FORMS */
.form-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:1.5rem;margin-bottom:1.5rem}
.form-card h3{font-size:15px;font-weight:600;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid #f0f0eb}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:1px solid #f0f0eb}
.tabs-form{display:flex;gap:4px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab-form{font-size:13px;padding:6px 14px;border:1px solid #e5e5e0;border-radius:20px;cursor:pointer;background:#fff;color:#888}
.tab-form.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
/* XLS DROP */
.drop-zone{border:2px dashed #ddd;border-radius:10px;padding:2rem;text-align:center;cursor:pointer;margin-bottom:1rem;transition:border-color 0.2s}
.drop-zone:hover{border-color:#888}
.drop-zone p{font-size:14px;color:#888;margin-bottom:6px}
.drop-zone small{font-size:12px;color:#aaa}
.progress-bar{height:4px;background:#e5e5e0;border-radius:2px;margin:8px 0}
.progress-fill{height:100%;background:#1a1a1a;border-radius:2px;transition:width 0.3s}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:320px}
.toast.show{opacity:1}
.toast.error{background:#c0392b}
.toast.success{background:#27ae60}
/* ALERTS */
.alert-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:1rem;margin-bottom:0.75rem;display:flex;align-items:flex-start;gap:12px}
.alert-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.alert-icon.red{background:#FEE8E4}
.alert-icon.yellow{background:#FEF3E2}
.alert-icon.green{background:#E8F8F0}
.alert-body{flex:1}
.alert-title{font-size:13px;font-weight:500;margin-bottom:2px}
.alert-desc{font-size:12px;color:#888}
/* DAY SUMMARY */
.day-summary{background:#1a1a1a;color:#fff;border-radius:10px;padding:1.25rem;margin-bottom:1.5rem}
.day-summary h3{font-size:14px;font-weight:500;margin-bottom:12px;color:#aaa}
.day-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.day-metric .label{font-size:11px;color:#888;margin-bottom:4px}
.day-metric .val{font-size:20px;font-weight:600;color:#fff}
/* MISC */
.empty{padding:3rem;text-align:center;color:#aaa;font-size:13px}
.loading{padding:2.5rem;text-align:center;color:#aaa;font-size:13px}
.reporte-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.reporte-fecha{font-size:12px;color:#888;margin-bottom:10px;font-weight:500}
.reporte-body{font-size:13px;white-space:pre-wrap;line-height:1.7}
@media(max-width:700px){.grid-2,.form-row{grid-template-columns:1fr}.logo span{display:none}.tab{padding:8px 12px;font-size:13px}}
</style>
</head>

</div>

<div class="toast" id="toast"></div>

// AUTH
function switchAuth(tab, btn){
  document.getElementById('auth-login').classList.toggle('hidden', tab!=='login');
  document.getElementById('auth-register').classList.toggle('hidden', tab!=='register');
  document.querySelectorAll('.tab-auth').forEach(t=>t.classList.remove('active'));

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('login-error');
  errEl.style.display='none';

async function doRegister(){

  const pass = document.getElementById('reg-pass').value;
  const btn = document.getElementById('btn-register');
  const errEl = document.getElementById('register-error');
  errEl.style.display='none';

async function doLogout(){

// Verificar sesión al cargar
sb.auth.onAuthStateChange(async (event, session) => {

    await initApp(session.user);

// TABS
function switchTab(tab){
  TABS.forEach((t,i)=>{
    document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab);
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
  });
  if(tab==='registrar') renderRegistrar();
}

// TOAST
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3500);
}

// SUPABASE QUERIES
async function query(table, opts={}){
  let q = sb.from(table).select(opts.select||'*');
  if(opts.order) q = q.order(opts.order, {ascending: opts.asc!==false});
  if(opts.limit) q = q.limit(opts.limit);
  const {data, error} = await q;
  if(error) throw error;
  return data||[];
}

async function insert(table, row){
  const {error} = await sb.from(table).insert(row);
  if(error) throw error;
}

async function loadAll(){
  TABS.forEach(t=>{
    if(t!=='registrar'){
      document.getElementById('tab-'+t).innerHTML='<div class="loading">Cargando...</div>';
      if(t!=='resumen') document.getElementById('tab-'+t).classList.add('hidden');
    }
  });
  Object.keys(charts).forEach(k=>{try{charts[k].destroy();}catch(e){}});
  charts={};
  try{
    const [ventas,stock,merma,reportes] = await Promise.all([
      query('ventas',{order:'created_at',asc:false,limit:1000}),
      query('stock',{order:'created_at',asc:false,limit:1000}),
      query('merma',{order:'created_at',asc:false,limit:500}),
      query('reportes',{order:'created_at',asc:false,limit:20})
    ]);
    DATA={ventas,stock,merma,reportes};
    document.getElementById('dot').className='status-dot';
    renderResumen();renderVentas();renderStock();renderMerma();renderAlertas();renderReportes();
  }catch(e){
    TABS.forEach(t=>{if(t!=='registrar')document.getElementById('tab-'+t).innerHTML=`<div class="empty">Error: ${e.message}</div>`;});
    document.getElementById('dot').className='status-dot red';
    showToast('Error cargando datos: '+e.message,'error');
  }
}

// UTILS
function num(v){return parseFloat(v)||0;}
function fmtEur(v){return Math.round(v).toLocaleString('es-ES')+'€';}
function fmtNum(v){return Math.round(v).toLocaleString('es-ES');}
function parseDate(str){if(!str)return null;return new Date(str);}
function getWeekRange(offset){
  const now=new Date();const day=now.getDay()||7;
  const mon=new Date(now);mon.setDate(now.getDate()-day+1+offset*7);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{start:mon,end:sun};
}
function fmtFecha(str){
  if(!str)return'—';
  const d=new Date(str);
  return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

// RESUMEN
function renderResumen(){
  const el=document.getElementById('tab-resumen');
  const vrows=DATA.ventas;
  const mrows=DATA.merma;
  const w0=getWeekRange(0);const w1=getWeekRange(-1);
  const vW0=vrows.filter(r=>{const d=parseDate(r.created_at);return d&&d>=w0.start&&d<=w0.end;});
  const vW1=vrows.filter(r=>{const d=parseDate(r.created_at);return d&&d>=w1.start&&d<=w1.end;});

  const impW1=vW1.reduce((s,r)=>s+num(r.importe),0);
  const udsW0=vW0.reduce((s,r)=>s+num(r.cantidad),0);
  const deltaW=impW1>0?((impW0-impW1)/impW1*100):0;
  const totalImp=vrows.reduce((s,r)=>s+num(r.importe),0);
  const totalMerma=mrows.reduce((s,r)=>s+num(r.cantidad),0);

  // Ventas por día últimos 14 días
  const byDay={};
  vrows.forEach(r=>{
    const d=parseDate(r.created_at);if(!d)return;
    const k=d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
    byDay[k]=(byDay[k]||0)+num(r.importe);
  });
  const dias=Object.keys(byDay).slice(-14);

  // Top 5 productos
  const byP={};vrows.forEach(r=>{const p=r.producto||'—';if(!byP[p])byP[p]=0;byP[p]+=num(r.importe);});
  const top5=Object.entries(byP).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Semana por día
  const dows=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const dataW0=Array(7).fill(0);const dataW1=Array(7).fill(0);
  vW0.forEach(r=>{const d=parseDate(r.created_at);if(d){const i=(d.getDay()||7)-1;dataW0[i]+=num(r.importe);}});
  vW1.forEach(r=>{const d=parseDate(r.created_at);if(d){const i=(d.getDay()||7)-1;dataW1[i]+=num(r.importe);}});

  el.innerHTML=`
    <div class="day-summary">
      <h3>${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</h3>

function fVentas(){
  const q=(document.getElementById('v-q').value||'').toLowerCase();

  const to=document.getElementById('v-to').value;

    return true;
  }).slice(0,500);
  document.getElementById('v-body').innerHTML=rows.length?rows.map(r=>`<tr><td>${fmtFecha(r.created_at)}</td><td>${(r.producto||'').replace(/_/g,' ')}</td><td style="text-align:right">${r.cantidad||0}</td><td style="text-align:right">${r.importe?num(r.importe).toFixed(2)+'€':'—'}</td></tr>`).join(''):'<tr><td colspan="4" class="empty">Sin resultados</td></tr>';
}

// ALERTAS
function renderAlertas(){
  const el=document.getElementById('tab-alertas');
  const alertas=[];
  const totalVUds=DATA.ventas.reduce((s,r)=>s+num(r.cantidad),0);
  const totalMerma=DATA.merma.reduce((s,r)=>s+num(r.cantidad),0);
  const ratio=totalVUds>0?(totalMerma/totalVUds*100):0;
  if(ratio>5) alertas.push({type:'red',icon:'⚠',title:'Merma elevada',desc:`Ratio: ${ratio.toFixed(1)}% (umbral 5%)`});
  else alertas.push({type:'green',icon:'✓',title:'Merma bajo control',desc:`Ratio actual: ${ratio.toFixed(1)}%`});
  const w0=getWeekRange(0);const w1=getWeekRange(-1);
  const impW0=DATA.ventas.filter(r=>{const d=parseDate(r.created_at);return d&&d>=w0.start&&d<=w0.end;}).reduce((s,r)=>s+num(r.importe),0);
  const impW1=DATA.ventas.filter(r=>{const d=parseDate(r.created_at);return d&&d>=w1.start&&d<=w1.end;}).reduce((s,r)=>s+num(r.importe),0);
  const deltaW=impW1>0?((impW0-impW1)/impW1*100):0;
  if(deltaW<-10) alertas.push({type:'red',icon:'📉',title:'Ventas a la baja esta semana',desc:`${deltaW.toFixed(1)}% vs semana anterior`});
  else if(deltaW>10) alertas.push({type:'green',icon:'📈',title:'Ventas al alza esta semana',desc:`+${deltaW.toFixed(1)}% vs semana anterior`});
  else alertas.push({type:'yellow',icon:'~',title:'Ventas estables',desc:`${deltaW.toFixed(1)}% vs semana anterior`});
  const byPM={};DATA.merma.forEach(r=>{const p=r.producto||'—';byPM[p]=(byPM[p]||0)+num(r.cantidad);});
  const topM=Object.entries(byPM).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(topM.length) alertas.push({type:'yellow',icon:'📦',title:'Productos con más merma',desc:topM.map(([p,v])=>`${p.replace(/_/g,' ')}: ${Math.round(v)}`).join(' · ')});
  el.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Alertas activas</div><div class="metric-value" style="color:#c0392b">${alertas.filter(a=>a.type==='red').length}</div></div>
      <div class="metric"><div class="metric-label">Avisos</div><div class="metric-value" style="color:#f39c12">${alertas.filter(a=>a.type==='yellow').length}</div></div>
      <div class="metric"><div class="metric-label">OK</div><div class="metric-value" style="color:#27ae60">${alertas.filter(a=>a.type==='green').length}</div></div>
    </div>
    ${alertas.map(a=>`<div class="alert-card"><div class="alert-icon ${a.type}">${a.icon}</div><div class="alert-body"><div class="alert-title">${a.title}</div><div class="alert-desc">${a.desc}</div></div><span class="badge b-${a.type==='red'?'alert':a.type==='green'?'ok':'warn'}">${a.type==='red'?'Alerta':a.type==='green'?'OK':'Aviso'}</span></div>`).join('')}`;
}

      <h3>Foto TPV</h3>
      <p style="font-size:13px;color:#888;margin-bottom:1rem">GPT-4o extrae los productos automáticamente.</p>
      <div class="drop-zone" id="foto-drop" onclick="document.getElementById('foto-file').click()" ondragover="event.preventDefault()" ondrop="handleFotoDrop(event)">

      <div id="foto-actions" class="hidden">
        <div class="progress-bar hidden" id="foto-bar"><div class="progress-fill" id="foto-fill" style="width:0%"></div></div>

          <span id="foto-status" style="font-size:13px;color:#888;align-self:center"></span>

      <div style="background:#f5f5f0;border-radius:8px;padding:1rem;margin-bottom:1rem;font-size:12px;color:#888;line-height:1.8">
        <strong style="color:#1a1a1a">Ejemplos:</strong><br>
        sobrante burrito_rebozado_BBQ 22, Caprese 10<br>
        entrega empanada argentina 3 cajas J_y_Q<br>
        venta corn_dog 15 uds 37.50€<br>
        merma pollo 3 uds caducado
      </div>
      <div class="field"><label>Mensaje</label><textarea id="f-txt" placeholder="Escribe o pega aquí..." rows="4"></textarea></div>
      <div id="f-txt-result"></div>
      <div class="form-actions"><button class="btn btn-primary btn-sm" id="f-txt-btn" onclick="submitTexto()">Procesar con IA</button></div>
    </div>`;
}

function showForm(name,btn){
  ['stock','ventas','merma','xls','foto','texto'].forEach(f=>document.getElementById('form-'+f).classList.add('hidden'));
  document.getElementById('form-'+name).classList.remove('hidden');
  document.querySelectorAll('.tab-form').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}
function getProd(sel,txt){return document.getElementById(txt).value.trim()||document.getElementById(sel).value;}

  const tipo=document.getElementById('f-s-tipo').value;
  const parada=document.getElementById('f-s-parada').value;

    document.getElementById('f-s-prod-txt').value='';

}

// XLS
function handleXLSDrop(e){e.preventDefault();handleXLSFile(e.dataTransfer.files[0]);}
function handleXLSFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{defval:''});
      xlsData=json.filter(r=>{
        const n=String(r['Nombre Código articulo']||r['Nombre Codigo articulo']||r['Nombre']||'').trim();
        const c=Number(r['CT']||r['Cantidad']||0);
        return n&&c>0&&!n.toUpperCase().includes('SUBTOTAL')&&!n.toUpperCase().includes('FAMILIA')&&n.toUpperCase()!=='TOTAL';
      }).map(r=>({
        producto:String(r['Nombre Código articulo']||r['Nombre Codigo articulo']||r['Nombre']||'').trim(),
        cantidad:Number(r['CT']||r['Cantidad']||0),
        importe:Number(String(r['Importe']||0).replace(',','.'))
      }));
      if(!xlsData.length){showToast('No se encontraron productos válidos','error');return;}
      document.getElementById('xls-preview').innerHTML=`<div class="table-wrap" style="max-height:300px;overflow-y:auto"><table><thead><tr><th>Producto</th><th style="text-align:right">Cant.</th><th style="text-align:right">Importe</th></tr></thead><tbody>${xlsData.slice(0,30).map(r=>`<tr><td>${r.producto}</td><td style="text-align:right">${r.cantidad}</td><td style="text-align:right">${r.importe.toFixed(2)}€</td></tr>`).join('')}${xlsData.length>30?`<tr><td colspan="3" style="text-align:center;color:#aaa;padding:8px">... y ${xlsData.length-30} más</td></tr>`:''}</tbody></table></div>`;
      document.getElementById('xls-count').textContent=`${xlsData.length} productos`;
      document.getElementById('xls-actions').classList.remove('hidden');
      document.getElementById('xls-drop').style.borderColor='#27ae60';
    }catch(err){showToast('Error leyendo archivo','error');}
  };
  reader.readAsBinaryString(file);
}
async function submitXLS(){
  if(!xlsData.length)return;
  const bar=document.getElementById('xls-bar');
  const fill=document.getElementById('xls-fill');
  bar.classList.remove('hidden');
  // Insertar en lotes de 50 directo a Supabase
  const BATCH=50;
  let ok=0;
  for(let i=0;i<xlsData.length;i+=BATCH){
    const lote=xlsData.slice(i,i+BATCH).map(r=>({...r,parada:'hernando_boqueria'}));
    try{
      const {error}=await sb.from('ventas').insert(lote);
      if(!error)ok+=lote.length;
    }catch(e){}
    fill.style.width=Math.round(Math.min(i+BATCH,xlsData.length)/xlsData.length*100)+'%';
  }
  showToast(`${ok}/${xlsData.length} registros importados ✓`,'success');
  setTimeout(resetXLS,1500);
}
function resetXLS(){
  xlsData=[];
  document.getElementById('xls-preview').innerHTML='';
  document.getElementById('xls-actions').classList.add('hidden');
  document.getElementById('xls-bar').classList.add('hidden');
  document.getElementById('xls-fill').style.width='0%';
  document.getElementById('xls-drop').style.borderColor='#ddd';
  document.getElementById('xls-file').value='';
}

// FOTO
function handleFotoDrop(e){e.preventDefault();handleFotoFile(e.dataTransfer.files[0]);}
function handleFotoFile(file){
  if(!file||!file.type.startsWith('image/')){showToast('Solo imágenes JPG/PNG/WEBP','error');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const dataUrl=e.target.result;
    document.getElementById('foto-preview').innerHTML=`<img src="${dataUrl}" style="max-width:100%;max-height:280px;border-radius:8px;border:1px solid #e5e5e0;margin-bottom:1rem">`;
    document.getElementById('foto-drop').style.borderColor='#27ae60';
    document.getElementById('foto-actions').classList.remove('hidden');
    document.getElementById('foto-file')._data={base64:dataUrl.split(',')[1],mimeType:file.type};
  };
  reader.readAsDataURL(file);
}
async function submitFoto(){
  const d=document.getElementById('foto-file')._data;
  if(!d){showToast('Selecciona una foto','error');return;}
  document.getElementById('foto-status').textContent='Procesando con IA...';
  document.getElementById('foto-bar').classList.remove('hidden');
  document.getElementById('foto-fill').style.width='40%';
  try{
    // Llamar al webhook n8n para procesar con GPT-4o y guardar en Supabase
    const res=await fetch('https://n8nn-n8n.vhekam.easypanel.host/webhook/hernando-panel',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({accion:'foto_tpv',base64:d.base64,mimeType:d.mimeType})
    });
    document.getElementById('foto-fill').style.width='100%';
    showToast('Foto procesada y ventas guardadas ✓','success');
    document.getElementById('foto-status').textContent='Completado';
    setTimeout(resetFoto,2000);
  }catch(e){showToast('Error: '+e.message,'error');document.getElementById('foto-bar').classList.add('hidden');}
}
function resetFoto(){
  document.getElementById('foto-preview').innerHTML='';
  document.getElementById('foto-actions').classList.add('hidden');
  document.getElementById('foto-bar').classList.add('hidden');
  document.getElementById('foto-fill').style.width='0%';
  document.getElementById('foto-drop').style.borderColor='#ddd';
  document.getElementById('foto-file').value='';
  document.getElementById('foto-status').textContent='';
}

// TEXTO LIBRE
async function submitTexto(){
  const texto=document.getElementById('f-txt').value.trim();
  if(!texto){showToast('Escribe algo primero','error');return;}
  const btn=document.getElementById('f-txt-btn');
  const res=document.getElementById('f-txt-result');
  btn.disabled=true;btn.textContent='Procesando...';
  res.innerHTML='<div style="font-size:13px;color:#888;padding:8px">Enviando a la IA...</div>';
  try{
    const r=await fetch('https://n8nn-n8n.vhekam.easypanel.host/webhook/hernando-panel',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({accion:'texto_libre',texto})
    });
    const data=await r.json();
    res.innerHTML=`<div style="background:#E8F8F0;border-radius:8px;padding:12px;font-size:13px;color:#1A6B40">Guardado correctamente ✓</div>`;
    showToast('Texto procesado y guardado','success');
    document.getElementById('f-txt').value='';
  }catch(e){
    res.innerHTML=`<div style="background:#FEE8E4;border-radius:8px;padding:12px;font-size:13px;color:#7A2515">Error: ${e.message}</div>`;
  }
  btn.disabled=false;btn.textContent='Procesar con IA';
}

// REPORTES
function renderReportes(){
  const el=document.getElementById('tab-reportes');
  const rows=DATA.reportes;
  el.innerHTML=rows.length?rows.map(r=>`<div class="reporte-card"><div class="reporte-fecha">${fmtFecha(r.created_at)}</div><div class="reporte-body">${(r.reporte||'').slice(0,1500)}${(r.reporte||'').length>1500?'\n…':''}</div></div>`).join(''):'<div class="empty">Sin reportes todavía.</div>';

// CSV EXPORT
function exportCSV(tipo){
  let rows,headers,filename;
  if(tipo==='ventas'){rows=DATA.ventas;headers=['created_at','producto','cantidad','importe','parada'];filename='ventas.csv';}
  else if(tipo==='stock'){rows=DATA.stock;headers=['created_at','producto','cantidad','tipo','parada'];filename='stock.csv';}
  else if(tipo==='merma'){rows=DATA.merma;headers=['created_at','producto','cantidad','motivo','parada'];filename='merma.csv';}
  const csv=[headers.join(','),...rows.map(r=>headers.map(h=>'"'+(r[h]||'').toString().replace(/"/g,'""')+'"').join(','))].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=filename;a.click();
}
